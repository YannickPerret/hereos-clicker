<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">\n
    <defs>
      <filter id="glow-voidking" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
  
<rect width="100" height="100" fill="transparent" />

      <polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="#000000" stroke-width="3" filter="url(#glow-voidking)"/>
      <polygon points="50,25 75,50 50,75 25,50" fill="none" stroke="#ffffff" stroke-width="1" filter="url(#glow-voidking)"/>
      <circle cx="50" cy="50" r="10" fill="#000000" filter="url(#glow-voidking)"/>
    
</svg>