services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5080:3333"
      - "24678:24678"  # Vite HMR websocket
    volumes:
      - .:/app
      - /app/node_modules
      - app_data:/app/tmp
    environment:
      - TZ=UTC
      - PORT=3333
      - HOST=0.0.0.0
      - NODE_ENV=development
      - APP_KEY=VOpAKKQuX7tNtYaieFYnwM6yiOEDLezv
      - LOG_LEVEL=info
      - SESSION_DRIVER=cookie
    restart: unless-stopped

volumes:
  app_data:
