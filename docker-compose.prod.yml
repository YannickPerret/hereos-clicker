services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env.prod
    expose:
      - "3333"
    volumes:
      - app_data:/app/tmp
      - uploads_data:/app/public/assets/maps
      - sprites_data:/app/public/assets/sprites
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app_data:
  uploads_data:
  sprites_data:
