services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    expose:
      - "3333"
    volumes:
      - app_data:/app/tmp
      - uploads_data:/app/build/public/assets/maps
      - sprites_data:/app/build/public/assets/sprites
    environment:
      - TZ=UTC
      - PORT=3333
      - HOST=0.0.0.0
      - NODE_ENV=production
      - APP_KEY=VOpAKKQuX7tNtYaieFYnwM6yiOEDLezv
      - LOG_LEVEL=info
      - SESSION_DRIVER=cookie
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app_data:
  uploads_data:
  sprites_data:
